name: Compatibility report
description: Report a sanitized Codex CLI, Desktop, Pet, or following incompatibility.
title: "[Compatibility]: "
labels: [compatibility]
body:
  - type: markdown
    attributes:
      value: |
        Provide only the requested version/state data. Do not attach raw protocol payloads, tokens, account identity, conversation content, private screenshots, raw Accessibility errors or trees, executable paths, PIDs, or user-specific paths.
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: 15.4
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options: [arm64, x86_64]
    validations:
      required: true
  - type: input
    id: halo_version
    attributes:
      label: Pet Halo version
      placeholder: 0.1.0 Beta 1
    validations:
      required: true
  - type: input
    id: cli_version
    attributes:
      label: Codex CLI version
      placeholder: Output version number only
    validations:
      required: true
  - type: input
    id: desktop_version
    attributes:
      label: Codex Desktop version
      placeholder: Marketing version and build number only
    validations:
      required: true
  - type: dropdown
    id: pet_state
    attributes:
      label: Pet state
      options:
        - Visible
        - Tucked away
        - Not enabled
        - Unknown
    validations:
      required: true
  - type: dropdown
    id: safe_state
    attributes:
      label: Safe application state
      options:
        - CLI not found
        - CLI version unsupported
        - Authentication unavailable
        - Rate limits unavailable
        - Today unavailable
        - Codex Desktop not running
        - Accessibility required
        - Pet unavailable
        - Pet target ambiguous
        - Other non-private state
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Sanitized reproduction steps
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I included only version numbers, architecture, Pet visibility, safe state, and sanitized steps.
          required: true
        - label: I did not attach raw payloads, credentials, identity, conversations, paths, PIDs, Accessibility errors, or private screenshots.
          required: true
