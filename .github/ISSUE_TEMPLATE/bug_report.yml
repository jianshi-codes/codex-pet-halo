name: Bug report
description: Report a reproducible Pet Halo defect without private data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Never attach raw protocol payloads, tokens, account identity, conversation content, private screenshots, raw Accessibility errors, executable paths, PIDs, or user-specific paths. Use the compatibility form for CLI/Desktop compatibility problems.
  - type: input
    id: version
    attributes:
      label: Pet Halo version
      placeholder: 0.1.0 Beta 1
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and architecture
      placeholder: macOS 15.x, arm64
    validations:
      required: true
  - type: dropdown
    id: safe_state
    attributes:
      label: Safe application state
      options:
        - Usage unavailable
        - Following unavailable
        - Pet visible
        - Pet tucked away
        - Window fallback
        - Free-floating
        - Quit or relaunch
        - Other non-private state
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use concise steps without private data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and observed behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed raw payloads, credentials, identity, conversations, paths, PIDs, Accessibility errors, and private screenshots.
          required: true
