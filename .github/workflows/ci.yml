name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  protocol-evidence:
    name: Protocol evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run retained M0 tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s Tests -p 'test_*.py' -v
          python3 -m compileall -q Tools/ProtocolProbe Tests
      - name: Parse generated JSON schemas
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          paths = list(Path("Tools/ProtocolProbe/Schemas").rglob("*.json"))
          if not paths:
              raise SystemExit("no generated JSON schemas found")
          for path in paths:
              with path.open(encoding="utf-8") as handle:
                  json.load(handle)
          print(f"Parsed {len(paths)} generated JSON schemas")
          PY
      - name: Run privacy and path scans
        run: ./Scripts/privacy-scan.sh
      - name: Audit reachable Git history for public exposure
        run: make public-exposure-audit
      - name: Check whitespace
        run: git diff --check

  macos-application:
    name: macOS application
    runs-on: macos-15
    env:
      XCODEGEN_VERSION: 2.46.0
      XCODEGEN_SHA256: 4d9e34b62172d645eed6457cac13fc222569974098ef4ee9c3368bedf0196806
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false
      - name: Install pinned XcodeGen
        run: |
          set -euo pipefail
          readonly archive=/tmp/xcodegen.zip
          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            --proto '=https' \
            --tlsv1.2 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            --connect-timeout 15 \
            --max-time 120 \
            --output "$archive" \
            "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          printf '%s  %s\n' "$XCODEGEN_SHA256" "$archive" | shasum -a 256 --check
          mkdir -p /tmp/xcodegen-release
          ditto -x -k "$archive" /tmp/xcodegen-release
          echo "/tmp/xcodegen-release/xcodegen/bin" >> "$GITHUB_PATH"
      - name: Validate M0 through M9 deterministic gates
        run: make check
      - name: Check whitespace
        run: git diff --check
